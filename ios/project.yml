name: FamilyFinance

options:
  minimumXcodeGenVersion: 2.44.0
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  FamilyFinance:
    type: application
    platform: iOS
    sources:
      - path: FamilyFinance
        excludes:
          - Resources/**
    resources:
      - path: FamilyFinance/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.familyfinance
        INFOPLIST_FILE: FamilyFinance/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"

